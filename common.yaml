---
# AgnosticV common configuration for Writing Your First Playbook lab
# Zero-touch lab using CNV for VMs and Showroom for content delivery

env_type: zt-writing-your-first-playbook
cloud_provider: babylon_cnv

# Lab description and metadata
lab_name: Writing Your First Playbook with Ansible Lightspeed
lab_description: |
  A streamlined 4-module lab focused on showcasing Ansible Lightspeed's VS Code extension
  for generating comprehensive playbooks from plain-English prompts. Students learn LLM
  prompting best practices by constructing a single comprehensive prompt rather than
  iterating multiple times.

# Git repository for lab content and configuration
# TODO: Update this URL when migrating to Red Hat Ansible organization
git_config_directory: https://github.com/rhpds/zt-writing-your-first-playbook.git
git_config_ref: main

# Babylon CNV configuration
babylon_cnv:
  namespace: babylon-zt-writing-first-playbook

# Lab runtime settings
default_region: na
default_cloud_provider: babylon_cnv

# Student user configuration
student_name: rhel
student_password: ansible123!

# Lab duration (in hours)
lab_length_hours: 4

# Showroom integration
showroom_enabled: true
showroom_content_path: content

# Resource requirements from config/instances.yaml
# 5 VMs total: 1 control + 3 nodes + 1 vscode
# Total: 40G memory, 10 cores, 140Gi storage

# AgnosticV components
__meta__:
  deployer: babylon
  anarchy:
    namespace: anarchy-operator
  catalog:
    namespace: babylon-catalog-prod
    category: Ansible Automation Platform
    keywords:
      - ansible
      - lightspeed
      - playbook
      - automation
      - ai
      - llm
    display_name: "Writing Your First Playbook with Ansible Lightspeed"
    description: "Learn to generate production-ready Ansible playbooks using AI-powered Ansible Lightspeed"
    icon: https://www.ansible.com/hubfs/2016_Images/Assets/Ansible-Mark-Large-RGB-Pool.png

# Environment variables passed to setup-automation
env_vars:
  SATELLITE_URL: "{{ satellite_url }}"
  SATELLITE_ORG: "{{ satellite_org }}"
  SATELLITE_ACTIVATIONKEY: "{{ satellite_activationkey }}"
  # MAAS_API_KEY will be added here before production deployment

# Lifecycle hooks
agnosticd_git_repo: https://github.com/redhat-cop/agnosticd.git
agnosticd_git_tag: development

# CNV-specific settings
cnv_vm_quota:
  cpu: 10
  memory: 40Gi
  storage: 140Gi
