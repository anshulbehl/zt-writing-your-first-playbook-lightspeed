---
- name: Validate module 03 - user and MOTD on all hosts
  hosts: all
  become: true
  tasks:
    - name: Check that user padawan exists
      ansible.builtin.command:
        cmd: id padawan
      changed_when: false
      failed_when: false
      register: r_user

    - name: Fail if padawan does not exist
      ansible.builtin.fail:
        msg: "User 'padawan' does not exist on {{ inventory_hostname }}"
      when: r_user.rc != 0

    - name: Check MOTD contains this host's hostname
      ansible.builtin.shell: grep -q "{{ ansible_hostname }}" /etc/motd
      changed_when: false
      failed_when: false
      register: r_motd

    - name: Fail if MOTD is missing or does not reference hostname
      ansible.builtin.fail:
        msg: "/etc/motd on {{ inventory_hostname }} does not contain the expected hostname"
      when: r_motd.rc != 0

- name: Validate module 03 - httpd on web group only
  hosts: web
  become: true
  tasks:
    - name: Check that httpd is installed on web servers
      ansible.builtin.command:
        cmd: rpm -q httpd
      changed_when: false
      failed_when: false
      register: r_httpd

    - name: Fail if httpd is not installed
      ansible.builtin.fail:
        msg: "httpd is not installed on {{ inventory_hostname }}"
      when: r_httpd.rc != 0

    - name: Check that httpd is running
      ansible.builtin.command:
        cmd: systemctl is-active httpd
      changed_when: false
      failed_when: false
      register: r_httpd_active

    - name: Fail if httpd is not running
      ansible.builtin.fail:
        msg: "httpd is not running on {{ inventory_hostname }}"
      when: r_httpd_active.rc != 0

- name: Validate module 03 - httpd must NOT be on database group
  hosts: database
  become: true
  tasks:
    - name: Check httpd is not installed on database servers
      ansible.builtin.command:
        cmd: rpm -q httpd
      changed_when: false
      failed_when: false
      register: r_httpd_db

    - name: Fail if httpd is installed on database server
      ansible.builtin.fail:
        msg: "httpd should not be installed on {{ inventory_hostname }} (database group) — check your conditionals"
      when: r_httpd_db.rc == 0
