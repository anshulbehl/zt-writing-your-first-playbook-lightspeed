---
- name: Validate module 03 - Comprehensive playbook execution
  hosts: all
  become: true
  tasks:
    - name: Check that user padawan exists on all hosts
      ansible.builtin.command:
        cmd: id padawan
      changed_when: false
      register: user_check
      failed_when: user_check.rc != 0

    - name: Check that MOTD was updated on all hosts
      ansible.builtin.stat:
        path: /etc/motd
      register: motd_file
      failed_when: not motd_file.stat.exists

    - name: Verify MOTD contains hostname
      ansible.builtin.shell: grep -q "{{ ansible_hostname }}" /etc/motd
      changed_when: false
      failed_when: false
      register: motd_content

- name: Validate web group specific tasks
  hosts: web
  become: true
  tasks:
    - name: Check that httpd is installed
      ansible.builtin.command:
        cmd: rpm -q httpd
      changed_when: false
      register: httpd_check
      failed_when: httpd_check.rc != 0

    - name: Check that httpd is running
      ansible.builtin.systemd:
        name: httpd
      register: httpd_status
      failed_when: httpd_status.status.ActiveState != 'active'

    - name: Check that firewalld allows HTTP
      ansible.builtin.shell: firewall-cmd --list-services | grep -q http
      changed_when: false
      register: firewall_check
      failed_when: firewall_check.rc != 0

- name: Validate database group (should NOT have httpd)
  hosts: database
  become: true
  tasks:
    - name: Verify httpd is NOT installed on database servers
      ansible.builtin.command:
        cmd: rpm -q httpd
      changed_when: false
      register: httpd_check
      failed_when: httpd_check.rc == 0
      ignore_errors: true
