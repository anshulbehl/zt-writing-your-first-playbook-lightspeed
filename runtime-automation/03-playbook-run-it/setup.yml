---
# Setup playbook for module 03 - runs at module start
- name: Setup nodes for comprehensive playbook execution
  hosts: nodes
  become: true
  tasks:
    - name: Install packages needed for httpd
      ansible.builtin.dnf:
        name: cups-filesystem
        state: present

    - name: Disable SELinux
      ansible.posix.selinux:
        state: disabled
