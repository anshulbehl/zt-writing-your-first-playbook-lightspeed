---
- name: Create inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Add bastion host
      ansible.builtin.add_host:
        name: "{{ lookup('ansible.builtin.env', 'BASTION_HOST') }}"
        ansible_ssh_host: "{{ lookup('ansible.builtin.env', 'BASTION_HOST') }}"
        ansible_ssh_port: "{{ lookup('ansible.builtin.env', 'BASTION_PORT') }}"
        ansible_ssh_user: "{{ lookup('ansible.builtin.env', 'BASTION_USER') }}"
        ansible_ssh_pass: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"

- name: Dispatch module stage playbook
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Check if module stage playbook exists
      ansible.builtin.stat:
        path: "./{{ module_dir }}/{{ module_stage }}.yml"
      register: r_playbook

    - name: Run module stage playbook
      when: r_playbook.stat.exists
      ansible.builtin.command:
        cmd: >
          ansible-playbook
          ./{{ module_dir }}/{{ module_stage }}.yml
          -i {{ playbook_dir }}/../inventory
          --extra-vars "job_info_dir={{ job_info_dir | default('/tmp') }}"
        chdir: "{{ playbook_dir }}"
      register: r_result
      failed_when: r_result.rc != 0

    - name: Write playbook output to job_info_dir
      ansible.builtin.copy:
        content: "{{ r_result.stdout | default('') }}"
        dest: "{{ job_info_dir }}/output.txt"
        mode: "0644"
      delegate_to: localhost
      when: r_playbook.stat.exists and job_info_dir is defined

    - name: Fail with output if playbook failed
      ansible.builtin.fail:
        msg: "Module {{ module_dir }}/{{ module_stage }}.yml failed:\n{{ r_result.stderr | default('') }}"
      when: r_playbook.stat.exists and r_result.rc != 0
