---
- name: Solve module 02 - Create comprehensive playbook and templates
  hosts: controller
  vars:
    USER: rhel
  tasks:
    - name: Create templates directory
      ansible.builtin.file:
        path: /home/{{ USER }}/ansible-files/templates
        state: directory
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0755"

    - name: Create MOTD Jinja2 template
      ansible.builtin.copy:
        content: |
          {% raw %}
          Welcome to {{ ansible_hostname }}.
          Role: {% if inventory_hostname in groups['web'] %}Web Server{% elif inventory_hostname in groups['database'] %}Database Server{% else %}Server{% endif %}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Architecture: {{ ansible_architecture }}
          {% endraw %}
        dest: /home/{{ USER }}/ansible-files/templates/motd.j2
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create index.html.j2 template
      ansible.builtin.copy:
        content: |
          {% raw %}
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>{{ ansible_hostname }} - Status</title>
              <style>
                  body { font-family: system-ui, sans-serif; margin: 2rem; background: #1a1a2e; color: #e0e0e0; }
                  h1 { margin-bottom: 1rem; }
                  table { border-collapse: collapse; }
                  td { padding: 0.4rem 1rem 0.4rem 0; }
                  td:first-child { color: #888; }
                  .footer { margin-top: 1.5rem; color: #555; font-size: 0.85rem; }
              </style>
          </head>
          <body>
              <h1>{{ ansible_hostname }}</h1>
              <table>
                  <tr><td>IP Address</td><td>{{ ansible_default_ipv4.address }}</td></tr>
                  <tr><td>OS</td><td>{{ ansible_distribution }} {{ ansible_distribution_version }}</td></tr>
                  <tr><td>Architecture</td><td>{{ ansible_architecture }}</td></tr>
                  <tr><td>Kernel</td><td>{{ ansible_kernel }}</td></tr>
                  <tr><td>Python</td><td>{{ ansible_python_version }}</td></tr>
              </table>
              <p class="footer">Managed by Ansible</p>
          </body>
          </html>
          {% endraw %}
        dest: /home/{{ USER }}/ansible-files/templates/index.html.j2
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create comprehensive system_setup.yml playbook
      ansible.builtin.copy:
        content: |
          ---
          - name: Web and Database Infrastructure Setup
            hosts: all
            become: true
            vars:
              user_name: padawan
              web_package: httpd
              web_service: httpd
              db_package: mariadb-server
              db_service: mariadb
            tasks:
              - name: Create a sysadmin user
                ansible.builtin.user:
                  name: "{% raw %}{{ user_name }}{% endraw %}"
                  state: present
                  create_home: true

              - name: Install Apache on web servers
                ansible.builtin.dnf:
                  name: "{% raw %}{{ web_package }}{% endraw %}"
                  state: present
                when: inventory_hostname in groups['web']

              - name: Ensure Apache is running and enabled
                ansible.builtin.service:
                  name: "{% raw %}{{ web_service }}{% endraw %}"
                  state: started
                  enabled: true
                when: inventory_hostname in groups['web']

              - name: Deploy status page to web servers
                ansible.builtin.template:
                  src: templates/index.html.j2
                  dest: /var/www/html/index.html
                  mode: "0644"
                when: inventory_hostname in groups['web']
                notify: Restart Apache

              - name: Install MariaDB on database servers
                ansible.builtin.dnf:
                  name: "{% raw %}{{ db_package }}{% endraw %}"
                  state: present
                when: inventory_hostname in groups['database']

              - name: Ensure MariaDB is running and enabled
                ansible.builtin.service:
                  name: "{% raw %}{{ db_service }}{% endraw %}"
                  state: started
                  enabled: true
                when: inventory_hostname in groups['database']

              - name: Deploy MOTD template
                ansible.builtin.template:
                  src: templates/motd.j2
                  dest: /etc/motd
                  mode: "0644"

            handlers:
              - name: Restart Apache
                ansible.builtin.service:
                  name: "{% raw %}{{ web_service }}{% endraw %}"
                  state: restarted
        dest: /home/{{ USER }}/ansible-files/system_setup.yml
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"
