---
- name: Solve module 02 - Create comprehensive playbook and template
  hosts: controller
  vars:
    USER: rhel
  tasks:
    - name: Create templates directory
      ansible.builtin.file:
        path: /home/{{ USER }}/ansible-files/templates
        state: directory
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0755"

    - name: Create MOTD Jinja2 template
      ansible.builtin.copy:
        content: |
          {% raw %}
          Welcome to {{ ansible_hostname }}.
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Architecture: {{ ansible_architecture }}
          {% endraw %}
        dest: /home/{{ USER }}/ansible-files/templates/motd.j2
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create comprehensive system_setup.yml playbook
      ansible.builtin.copy:
        content: |
          ---
          - name: Basic System Setup
            hosts: all
            become: true
            vars:
              user_name: 'padawan'
              package_name: httpd
              apache_service_name: httpd
            tasks:
              - name: Install security updates for the kernel
                ansible.builtin.dnf:
                  name: 'kernel'
                  state: latest
                  security: true
                  update_only: true
                when: inventory_hostname in groups['web']

              - name: Create a new user
                ansible.builtin.user:
                  name: "{% raw %}{{ user_name }}{% endraw %}"
                  state: present
                  create_home: true

              - name: Install Apache on web servers
                ansible.builtin.dnf:
                  name: "{% raw %}{{ package_name }}{% endraw %}"
                  state: present
                when: inventory_hostname in groups['web']

              - name: Ensure Apache is running and enabled
                ansible.builtin.service:
                  name: "{% raw %}{{ apache_service_name }}{% endraw %}"
                  state: started
                  enabled: true
                when: inventory_hostname in groups['web']

              - name: Update MOTD from Jinja2 Template
                ansible.builtin.template:
                  src: templates/motd.j2
                  dest: /etc/motd
        dest: /home/{{ USER }}/ansible-files/system_setup.yml
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"
