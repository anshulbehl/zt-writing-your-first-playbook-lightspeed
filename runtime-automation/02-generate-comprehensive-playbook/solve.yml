---
- name: Solve module 02 - Create comprehensive playbook and templates
  hosts: controller
  vars:
    USER: rhel
  tasks:
    - name: Create templates directory
      ansible.builtin.file:
        path: /home/{{ USER }}/ansible-files/templates
        state: directory
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0755"

    - name: Create MOTD Jinja2 template
      ansible.builtin.copy:
        content: |
          {% raw %}
          Welcome to {{ ansible_hostname }}.
          Role: {% if inventory_hostname in groups['web'] %}Web Server{% elif inventory_hostname in groups['database'] %}Database Server{% else %}Server{% endif %}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Architecture: {{ ansible_architecture }}
          {% endraw %}
        dest: /home/{{ USER }}/ansible-files/templates/motd.j2
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create index.html.j2 template
      ansible.builtin.copy:
        content: |
          {% raw %}
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>{{ ansible_hostname }} - Status</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
                      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
                      color: #e0e0e0;
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      min-height: 100vh;
                  }
                  .card {
                      background: rgba(255, 255, 255, 0.05);
                      backdrop-filter: blur(10px);
                      border: 1px solid rgba(255, 255, 255, 0.1);
                      border-radius: 16px;
                      padding: 2.5rem 3rem;
                      max-width: 500px;
                      width: 90%;
                      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
                  }
                  .badge {
                      display: inline-block;
                      background: #e94560;
                      color: #fff;
                      padding: 0.25rem 0.75rem;
                      border-radius: 20px;
                      font-size: 0.75rem;
                      font-weight: 600;
                      text-transform: uppercase;
                      letter-spacing: 0.05em;
                      margin-bottom: 1rem;
                  }
                  h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 1.5rem; color: #fff; }
                  table { width: 100%; border-collapse: collapse; }
                  tr { border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
                  tr:last-child { border-bottom: none; }
                  td { padding: 0.75rem 0; }
                  td:first-child { color: #8a8a9a; width: 45%; font-size: 0.9rem; }
                  td:last-child { color: #fff; font-weight: 500; }
                  .footer {
                      margin-top: 2rem;
                      padding-top: 1rem;
                      border-top: 1px solid rgba(255, 255, 255, 0.06);
                      text-align: center;
                      font-size: 0.8rem;
                      color: #555;
                  }
                  .footer span { color: #e94560; }
              </style>
          </head>
          <body>
              <div class="card">
                  <div class="badge">Web Server</div>
                  <h1>{{ ansible_hostname }}</h1>
                  <table>
                      <tr><td>IP Address</td><td>{{ ansible_default_ipv4.address }}</td></tr>
                      <tr><td>Operating System</td><td>{{ ansible_distribution }} {{ ansible_distribution_version }}</td></tr>
                      <tr><td>Architecture</td><td>{{ ansible_architecture }}</td></tr>
                      <tr><td>Kernel</td><td>{{ ansible_kernel }}</td></tr>
                      <tr><td>Python</td><td>{{ ansible_python_version }}</td></tr>
                  </table>
                  <div class="footer">Managed by <span>Ansible</span></div>
              </div>
          </body>
          </html>
          {% endraw %}
        dest: /home/{{ USER }}/ansible-files/templates/index.html.j2
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create comprehensive system_setup.yml playbook
      ansible.builtin.copy:
        content: |
          ---
          - name: Web and Database Infrastructure Setup
            hosts: all
            become: true
            vars:
              user_name: padawan
              web_package: httpd
              web_service: httpd
              db_package: mariadb-server
              db_service: mariadb
            tasks:
              - name: Create a sysadmin user
                ansible.builtin.user:
                  name: "{% raw %}{{ user_name }}{% endraw %}"
                  state: present
                  create_home: true

              - name: Install Apache on web servers
                ansible.builtin.dnf:
                  name: "{% raw %}{{ web_package }}{% endraw %}"
                  state: present
                when: inventory_hostname in groups['web']

              - name: Ensure Apache is running and enabled
                ansible.builtin.service:
                  name: "{% raw %}{{ web_service }}{% endraw %}"
                  state: started
                  enabled: true
                when: inventory_hostname in groups['web']

              - name: Deploy status page to web servers
                ansible.builtin.template:
                  src: templates/index.html.j2
                  dest: /var/www/html/index.html
                  mode: "0644"
                when: inventory_hostname in groups['web']
                notify: Restart Apache

              - name: Install MariaDB on database servers
                ansible.builtin.dnf:
                  name: "{% raw %}{{ db_package }}{% endraw %}"
                  state: present
                when: inventory_hostname in groups['database']

              - name: Ensure MariaDB is running and enabled
                ansible.builtin.service:
                  name: "{% raw %}{{ db_service }}{% endraw %}"
                  state: started
                  enabled: true
                when: inventory_hostname in groups['database']

              - name: Deploy MOTD template
                ansible.builtin.template:
                  src: templates/motd.j2
                  dest: /etc/motd
                  mode: "0644"

            handlers:
              - name: Restart Apache
                ansible.builtin.service:
                  name: "{% raw %}{{ web_service }}{% endraw %}"
                  state: restarted
        dest: /home/{{ USER }}/ansible-files/system_setup.yml
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"
