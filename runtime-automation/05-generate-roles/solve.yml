---
- name: Solve module 05 - Create role structure from system_setup playbook
  hosts: controller
  vars:
    USER: rhel
    ROLE_DIR: /home/rhel/ansible-files/roles/system_setup
  tasks:
    - name: Create role directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0755"
      loop:
        - "{{ ROLE_DIR }}"
        - "{{ ROLE_DIR }}/tasks"
        - "{{ ROLE_DIR }}/handlers"
        - "{{ ROLE_DIR }}/templates"
        - "{{ ROLE_DIR }}/vars"
        - "{{ ROLE_DIR }}/defaults"
        - "{{ ROLE_DIR }}/meta"

    - name: Create tasks/main.yml
      ansible.builtin.copy:
        content: |
          ---
          - name: Create a sysadmin user
            ansible.builtin.user:
              name: "{% raw %}{{ system_setup_user_name }}{% endraw %}"
              state: present
              create_home: true

          - name: Install Apache on web servers
            ansible.builtin.dnf:
              name: "{% raw %}{{ system_setup_web_package }}{% endraw %}"
              state: present
            when: inventory_hostname in groups['web']

          - name: Ensure Apache is running and enabled
            ansible.builtin.service:
              name: "{% raw %}{{ system_setup_web_service }}{% endraw %}"
              state: started
              enabled: true
            when: inventory_hostname in groups['web']

          - name: Deploy status page to web servers
            ansible.builtin.template:
              src: index.html.j2
              dest: /var/www/html/index.html
              mode: "0644"
            when: inventory_hostname in groups['web']
            notify: Restart Apache

          - name: Install MariaDB on database servers
            ansible.builtin.dnf:
              name: "{% raw %}{{ system_setup_db_package }}{% endraw %}"
              state: present
            when: inventory_hostname in groups['database']

          - name: Ensure MariaDB is running and enabled
            ansible.builtin.service:
              name: "{% raw %}{{ system_setup_db_service }}{% endraw %}"
              state: started
              enabled: true
            when: inventory_hostname in groups['database']

          - name: Deploy MOTD template
            ansible.builtin.template:
              src: motd.j2
              dest: /etc/motd
              mode: "0644"
        dest: "{{ ROLE_DIR }}/tasks/main.yml"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create handlers/main.yml
      ansible.builtin.copy:
        content: |
          ---
          - name: Restart Apache
            ansible.builtin.service:
              name: "{% raw %}{{ system_setup_web_service }}{% endraw %}"
              state: restarted
        dest: "{{ ROLE_DIR }}/handlers/main.yml"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create vars/main.yml
      ansible.builtin.copy:
        content: |
          ---
          system_setup_user_name: padawan
          system_setup_web_package: httpd
          system_setup_web_service: httpd
          system_setup_db_package: mariadb-server
          system_setup_db_service: mariadb
        dest: "{{ ROLE_DIR }}/vars/main.yml"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create defaults/main.yml
      ansible.builtin.copy:
        content: |
          ---
          system_setup_user_name: padawan
          system_setup_web_package: httpd
          system_setup_web_service: httpd
          system_setup_db_package: mariadb-server
          system_setup_db_service: mariadb
        dest: "{{ ROLE_DIR }}/defaults/main.yml"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create meta/main.yml
      ansible.builtin.copy:
        content: |
          ---
          galaxy_info:
            author: Workshop Student
            description: Web and database infrastructure setup role
            license: GPL-3.0-or-later
            min_ansible_version: "2.15"
            platforms:
              - name: EL
                versions:
                  - "9"
          dependencies: []
        dest: "{{ ROLE_DIR }}/meta/main.yml"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Copy MOTD template to role
      ansible.builtin.copy:
        content: |
          {% raw %}
          Welcome to {{ ansible_hostname }}.
          Role: {% if inventory_hostname in groups['web'] %}Web Server{% elif inventory_hostname in groups['database'] %}Database Server{% else %}Server{% endif %}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Architecture: {{ ansible_architecture }}
          {% endraw %}
        dest: "{{ ROLE_DIR }}/templates/motd.j2"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Copy index.html.j2 template to role
      ansible.builtin.copy:
        content: |
          {% raw %}
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <title>{{ ansible_hostname }} - Status</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
                  .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 2.5rem 3rem; max-width: 500px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
                  .badge { display: inline-block; background: #e94560; color: #fff; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 1rem; }
                  h1 { font-size: 1.75rem; margin-bottom: 1.5rem; color: #fff; }
                  table { width: 100%; border-collapse: collapse; }
                  tr { border-bottom: 1px solid rgba(255,255,255,0.06); }
                  tr:last-child { border-bottom: none; }
                  td { padding: 0.75rem 0; }
                  td:first-child { color: #8a8a9a; width: 45%; }
                  td:last-child { color: #fff; font-weight: 500; }
                  .footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.06); text-align: center; font-size: 0.8rem; color: #555; }
                  .footer span { color: #e94560; }
              </style>
          </head>
          <body>
              <div class="card">
                  <div class="badge">Web Server</div>
                  <h1>{{ ansible_hostname }}</h1>
                  <table>
                      <tr><td>IP Address</td><td>{{ ansible_default_ipv4.address }}</td></tr>
                      <tr><td>Operating System</td><td>{{ ansible_distribution }} {{ ansible_distribution_version }}</td></tr>
                      <tr><td>Architecture</td><td>{{ ansible_architecture }}</td></tr>
                      <tr><td>Kernel</td><td>{{ ansible_kernel }}</td></tr>
                      <tr><td>Python</td><td>{{ ansible_python_version }}</td></tr>
                  </table>
                  <div class="footer">Managed by <span>Ansible</span></div>
              </div>
          </body>
          </html>
          {% endraw %}
        dest: "{{ ROLE_DIR }}/templates/index.html.j2"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"
