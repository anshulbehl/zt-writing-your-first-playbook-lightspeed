---
- name: Solve module 05 - Create role structure from system_setup playbook
  hosts: controller
  vars:
    USER: rhel
    ROLE_DIR: /home/rhel/ansible-files/roles/system_setup
  tasks:
    - name: Create role directory structure
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0755"
      loop:
        - "{{ ROLE_DIR }}"
        - "{{ ROLE_DIR }}/tasks"
        - "{{ ROLE_DIR }}/handlers"
        - "{{ ROLE_DIR }}/templates"
        - "{{ ROLE_DIR }}/vars"
        - "{{ ROLE_DIR }}/defaults"
        - "{{ ROLE_DIR }}/meta"

    - name: Create tasks/main.yml
      ansible.builtin.copy:
        content: |
          ---
          - name: Create a sysadmin user
            ansible.builtin.user:
              name: "{% raw %}{{ system_setup_user_name }}{% endraw %}"
              state: present
              create_home: true

          - name: Install Apache on web servers
            ansible.builtin.dnf:
              name: "{% raw %}{{ system_setup_web_package }}{% endraw %}"
              state: present
            when: inventory_hostname in groups['web']

          - name: Ensure Apache is running and enabled
            ansible.builtin.service:
              name: "{% raw %}{{ system_setup_web_service }}{% endraw %}"
              state: started
              enabled: true
            when: inventory_hostname in groups['web']

          - name: Deploy status page to web servers
            ansible.builtin.template:
              src: index.html.j2
              dest: /var/www/html/index.html
              mode: "0644"
            when: inventory_hostname in groups['web']
            notify: Restart Apache

          - name: Install MariaDB on database servers
            ansible.builtin.dnf:
              name: "{% raw %}{{ system_setup_db_package }}{% endraw %}"
              state: present
            when: inventory_hostname in groups['database']

          - name: Ensure MariaDB is running and enabled
            ansible.builtin.service:
              name: "{% raw %}{{ system_setup_db_service }}{% endraw %}"
              state: started
              enabled: true
            when: inventory_hostname in groups['database']

          - name: Deploy MOTD template
            ansible.builtin.template:
              src: motd.j2
              dest: /etc/motd
              mode: "0644"
        dest: "{{ ROLE_DIR }}/tasks/main.yml"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create handlers/main.yml
      ansible.builtin.copy:
        content: |
          ---
          - name: Restart Apache
            ansible.builtin.service:
              name: "{% raw %}{{ system_setup_web_service }}{% endraw %}"
              state: restarted
        dest: "{{ ROLE_DIR }}/handlers/main.yml"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create vars/main.yml
      ansible.builtin.copy:
        content: |
          ---
          system_setup_user_name: padawan
          system_setup_web_package: httpd
          system_setup_web_service: httpd
          system_setup_db_package: mariadb-server
          system_setup_db_service: mariadb
        dest: "{{ ROLE_DIR }}/vars/main.yml"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create defaults/main.yml
      ansible.builtin.copy:
        content: |
          ---
          system_setup_user_name: padawan
          system_setup_web_package: httpd
          system_setup_web_service: httpd
          system_setup_db_package: mariadb-server
          system_setup_db_service: mariadb
        dest: "{{ ROLE_DIR }}/defaults/main.yml"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Create meta/main.yml
      ansible.builtin.copy:
        content: |
          ---
          galaxy_info:
            author: Workshop Student
            description: Web and database infrastructure setup role
            license: GPL-3.0-or-later
            min_ansible_version: "2.15"
            platforms:
              - name: EL
                versions:
                  - "9"
          dependencies: []
        dest: "{{ ROLE_DIR }}/meta/main.yml"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Copy MOTD template to role
      ansible.builtin.copy:
        content: |
          {% raw %}
          Welcome to {{ ansible_hostname }}.
          Role: {% if inventory_hostname in groups['web'] %}Web Server{% elif inventory_hostname in groups['database'] %}Database Server{% else %}Server{% endif %}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Architecture: {{ ansible_architecture }}
          {% endraw %}
        dest: "{{ ROLE_DIR }}/templates/motd.j2"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"

    - name: Copy index.html.j2 template to role
      ansible.builtin.copy:
        content: |
          {% raw %}
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>{{ ansible_hostname }} - Status</title>
              <style>
                  body { font-family: system-ui, sans-serif; margin: 2rem; background: #1a1a2e; color: #e0e0e0; }
                  h1 { margin-bottom: 1rem; }
                  table { border-collapse: collapse; }
                  td { padding: 0.4rem 1rem 0.4rem 0; }
                  td:first-child { color: #888; }
                  .footer { margin-top: 1.5rem; color: #555; font-size: 0.85rem; }
              </style>
          </head>
          <body>
              <h1>{{ ansible_hostname }}</h1>
              <table>
                  <tr><td>IP Address</td><td>{{ ansible_default_ipv4.address }}</td></tr>
                  <tr><td>OS</td><td>{{ ansible_distribution }} {{ ansible_distribution_version }}</td></tr>
                  <tr><td>Architecture</td><td>{{ ansible_architecture }}</td></tr>
                  <tr><td>Kernel</td><td>{{ ansible_kernel }}</td></tr>
                  <tr><td>Python</td><td>{{ ansible_python_version }}</td></tr>
              </table>
              <p class="footer">Managed by Ansible</p>
          </body>
          </html>
          {% endraw %}
        dest: "{{ ROLE_DIR }}/templates/index.html.j2"
        owner: "{{ USER }}"
        group: "{{ USER }}"
        mode: "0644"
