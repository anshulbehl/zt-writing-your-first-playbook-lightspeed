---
# Module 01 setup — environment is fully prepared by setup-automation.
# This play runs a quick sanity check that the expected files are in place.
- name: Verify lab environment for module 01
  hosts: controller
  gather_facts: false
  tasks:
    - name: Confirm ansible-files directory exists
      ansible.builtin.file:
        path: /home/rhel/ansible-files
        state: directory
        owner: rhel
        group: rhel
        mode: "0755"

    - name: Confirm inventory is present
      ansible.builtin.stat:
        path: /home/rhel/ansible-files/inventory
      register: inv_stat

    - name: Fail if inventory is missing
      ansible.builtin.fail:
        msg: >
          The lab inventory is missing. This means setup-automation did not
          complete successfully. Please contact your lab administrator.
      when: not inv_stat.stat.exists

    - name: Confirm ansible-navigator.yml is present
      ansible.builtin.stat:
        path: /home/rhel/ansible-files/ansible-navigator.yml
      register: nav_stat

    - name: Fail if ansible-navigator.yml is missing
      ansible.builtin.fail:
        msg: >
          ansible-navigator.yml is missing. Setup-automation may not have
          completed successfully. Please contact your lab administrator.
      when: not nav_stat.stat.exists
