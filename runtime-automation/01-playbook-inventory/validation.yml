---
- name: Validate module 01 - Inventory exists and contains required groups
  hosts: controller
  gather_facts: false
  vars:
    USER: rhel
  tasks:
    - name: Check inventory file exists
      ansible.builtin.stat:
        path: /home/{{ USER }}/ansible-files/inventory
      register: r_inventory
      failed_when: not r_inventory.stat.exists

    - name: Check inventory contains web group
      ansible.builtin.shell: grep -q '^\[web\]' /home/{{ USER }}/ansible-files/inventory
      changed_when: false
      failed_when: false
      register: r_web

    - name: Fail if web group is missing
      ansible.builtin.fail:
        msg: "inventory is missing the [web] group"
      when: r_web.rc != 0

    - name: Check inventory contains database group
      ansible.builtin.shell: grep -q '^\[database\]' /home/{{ USER }}/ansible-files/inventory
      changed_when: false
      failed_when: false
      register: r_database

    - name: Fail if database group is missing
      ansible.builtin.fail:
        msg: "inventory is missing the [database] group"
      when: r_database.rc != 0

    - name: Check inventory contains node01 and node02 in web
      ansible.builtin.shell: grep -A5 '^\[web\]' /home/{{ USER }}/ansible-files/inventory | grep -q 'node01'
      changed_when: false
      failed_when: false
      register: r_node01

    - name: Fail if node01 missing from web group
      ansible.builtin.fail:
        msg: "inventory is missing node01 under the [web] group"
      when: r_node01.rc != 0

    - name: Check inventory contains node03 in database
      ansible.builtin.shell: grep -A5 '^\[database\]' /home/{{ USER }}/ansible-files/inventory | grep -q 'node03'
      changed_when: false
      failed_when: false
      register: r_node03

    - name: Fail if node03 missing from database group
      ansible.builtin.fail:
        msg: "inventory is missing node03 under the [database] group"
      when: r_node03.rc != 0
