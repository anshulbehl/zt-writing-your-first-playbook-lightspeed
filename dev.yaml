---
# Development/staging environment overrides for zt-writing-your-first-playbook
# Used for testing lab deployments before production

# Override git ref to use a development branch
git_config_ref: main

# Development namespace
babylon_cnv:
  namespace: babylon-zt-writing-first-playbook-dev

# Shorter lab duration for testing
lab_length_hours: 2

# Optional: use a different MAAS endpoint for testing
# env_vars:
#   MAAS_API_KEY: "{{ dev_maas_api_key }}"

# Optional: enable additional debugging
debug_level: 2

# AgnosticV catalog override for dev/staging
__meta__:
  catalog:
    namespace: babylon-catalog-stage
    display_name: "[DEV] Writing Your First Playbook with Ansible Lightspeed"
