        - echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd

  - name: "node03"
    image: "rhel-9.6"
    memory: "8G"
    cores: 2
    image_size: "30Gi"
    tags:
      - key: "AnsibleGroup"
        value: "isolated"
    networks:
      - default
    services:
      - name: node03-ssh
        ports:
          - port: 22
            protocol: TCP
            targetPort: 22
            name: ssh
    routes:
      - name: node03-ssh
        host: node03
