---
# Virtual machines for Writing Your First Playbook lab
# 1 control node (with code-server for VS Code) + 3 worker nodes
# All use devtools-ansible image for same-subnet connectivity (10.0.2.x)

virtualmachines:
  - name: "control"
    image: "devtools-ansible"
    memory: "8G"
    cores: 2
    image_size: "30Gi"
    disk_type: "scsi"
    bootloader: "efi"
    tags:
      - key: "AnsibleGroup"
        value: "isolated"
    networks:
      - default
    services:
      - name: vscode-8080
        ports:
          - port: 8080
            protocol: TCP
            targetPort: 8080
            name: vscode
    routes:
      - name: vscode-8080
        host: vscode
        service: vscode-8080
        targetPort: 8080
        tls: true
        tls_termination: Edge
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      runcmd:
        - echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd
        - echo "=== Network Setup Log ===" > /var/log/network-setup.log
        - echo "Date: $(date)" >> /var/log/network-setup.log
        - echo "" >> /var/log/network-setup.log
        - echo "Control IP Address:" >> /var/log/network-setup.log
        - ip addr show eth0 | grep "inet " >> /var/log/network-setup.log
        - echo "" >> /var/log/network-setup.log
        - echo "Routing Table:" >> /var/log/network-setup.log
        - ip route show >> /var/log/network-setup.log
        - echo "" >> /var/log/network-setup.log
        - echo "DNS Resolution Test:" >> /var/log/network-setup.log
        - getent hosts node01 >> /var/log/network-setup.log 2>&1 || echo "node01 resolution FAILED" >> /var/log/network-setup.log
        - getent hosts node02 >> /var/log/network-setup.log 2>&1 || echo "node02 resolution FAILED" >> /var/log/network-setup.log
        - getent hosts node03 >> /var/log/network-setup.log 2>&1 || echo "node03 resolution FAILED" >> /var/log/network-setup.log
        - echo "" >> /var/log/network-setup.log
        - echo "Gateway reachability:" >> /var/log/network-setup.log
        - ping -c 2 10.0.2.1 >> /var/log/network-setup.log 2>&1 || echo "Gateway 10.0.2.1 not reachable" >> /var/log/network-setup.log
        - chmod 644 /var/log/network-setup.log

  - name: "node01"
    image: "rhel-9.6"
    memory: "8G"
    cores: 2
    image_size: "30Gi"
    tags:
      - key: "AnsibleGroup"
        value: "isolated"
    networks:
      - default
    services:
      - name: node01-ssh
        ports:
          - port: 22
            protocol: TCP
            targetPort: 22
            name: ssh
    routes:
      - name: node01-ssh
        host: node01
        service: node01-ssh
        targetPort: 22
        tls: true
        tls_termination: Edge
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      runcmd:
        - echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd

  - name: "node02"
    image: "rhel-9.6"
    memory: "8G"
    cores: 2
