---
# Virtual machines for Writing Your First Playbook lab
# 1 control node (with code-server for VS Code) + 3 worker nodes
# All use devtools-ansible image for same-subnet connectivity (10.0.2.x)

virtualmachines:
  - name: "control"
    image: "devtools-ansible"
    memory: "8G"
    cores: 2
    image_size: "30Gi"
    disk_type: "scsi"
    bootloader: "efi"
    tags:
      - key: "AnsibleGroup"
        value: "isolated"
    networks:
      - default
    services:
      - name: vscode-8080
        ports:
          - port: 8080
            protocol: TCP
            targetPort: 8080
            name: vscode
    routes:
      - name: vscode-8080
        host: vscode
        service: vscode-8080
        targetPort: 8080
        tls: true
        tls_termination: Edge
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      runcmd:
        - echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd

  - name: "node1"
    image: "devtools-ansible"
    memory: "8G"
