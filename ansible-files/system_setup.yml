---
- name: Web and Database Infrastructure Setup
  hosts: all
  become: true
  vars:
    user_name: padawan
    web_package: httpd
    web_service: httpd
    db_package: mariadb-server
    db_service: mariadb
  tasks:
    - name: Create a sysadmin user
      ansible.builtin.user:
        name: "{{ user_name }}"
        state: present
        create_home: true

    - name: Install Apache on web servers
      ansible.builtin.dnf:
        name: "{{ web_package }}"
        state: present
      when: inventory_hostname in groups['web']

    - name: Ensure Apache is running and enabled
      ansible.builtin.service:
        name: "{{ web_service }}"
        state: started
        enabled: true
      when: inventory_hostname in groups['web']

    - name: Deploy status page to web servers
      ansible.builtin.template:
        src: templates/index.html.j2
        dest: /var/www/html/index.html
        mode: "0644"
      when: inventory_hostname in groups['web']
      notify: Restart Apache

    - name: Install MariaDB on database servers
      ansible.builtin.dnf:
        name: "{{ db_package }}"
        state: present
      when: inventory_hostname in groups['database']

    - name: Ensure MariaDB is running and enabled
      ansible.builtin.service:
        name: "{{ db_service }}"
        state: started
        enabled: true
      when: inventory_hostname in groups['database']

    - name: Deploy MOTD template
      ansible.builtin.template:
        src: templates/motd.j2
        dest: /etc/motd
        mode: "0644"

  handlers:
    - name: Restart Apache
      ansible.builtin.service:
        name: "{{ web_service }}"
        state: restarted
